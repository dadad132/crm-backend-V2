{% extends 'base.html' %}
{% block content %}
<style>
  .auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 3rem;
  }

  .auth-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    padding: 3rem;
    max-width: 440px;
    width: 100%;
    position: relative;
  }

  /* ── Character animations ─────────────────────────── */
  @keyframes char-float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
  }
  @keyframes shadow-pulse {
    0%, 100% { transform: translateX(-50%) scaleX(1);   opacity: .14; }
    50%       { transform: translateX(-50%) scaleX(.78); opacity: .07; }
  }
  @keyframes eye-blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95%            { transform: scaleY(0.06); }
  }
  @keyframes wave-arm {
    0%   { transform: rotate(10deg); }
    20%  { transform: rotate(-55deg) translateY(-10px); }
    50%  { transform: rotate(-65deg) translateY(-10px); }
    80%  { transform: rotate(-48deg) translateY(-6px); }
    100% { transform: rotate(10deg); }
  }
  @keyframes char-enter {
    from { opacity: 0; transform: translateY(44px) scale(.85); }
    to   { opacity: 1; transform: translateY(0)    scale(1);   }
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateX(-50%) scale(.75) translateY(6px); }
    to   { opacity: 1; transform: translateX(-50%) scale(1)   translateY(0);   }
  }

  /* ── Outer container ────────────────────────────────── */
  .character-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    animation: char-enter .65s cubic-bezier(.34,1.56,.64,1) both;
  }

  /* ── Root character element ─────────────────────────── */
  .char {
    width: 210px;
    height: 290px;
    position: relative;
    will-change: transform;
    animation: char-float 3.4s ease-in-out infinite .65s;
  }

  /* ── Ground shadow ──────────────────────────────────── */
  .char-shadow {
    width: 80px; height: 14px;
    background: radial-gradient(ellipse, rgba(0,0,0,.22) 0%, transparent 72%);
    position: absolute;
    bottom: 2px; left: 50%;
    transform: translateX(-50%);
    animation: shadow-pulse 3.4s ease-in-out infinite .65s;
  }

  /* ── Head ───────────────────────────────────────────── */
  .char-head {
    width: 122px; height: 122px;
    background: linear-gradient(150deg, #fde68a 0%, #fbbf24 55%, #f59e0b 100%);
    border-radius: 50%;
    position: absolute;
    top: 8px; left: 44px;
    border: 3px solid #f0960a;
    box-shadow: inset -10px -10px 22px rgba(224,110,0,.18), 0 5px 14px rgba(0,0,0,.12);
    z-index: 10;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  }

  /* ── Hair ───────────────────────────────────────────── */
  .char-hair {
    position: absolute;
    top: -13px; left: -3px;
    width: 128px; height: 58px;
    background: #1e1b4b;
    border-radius: 64px 64px 0 0;
    overflow: hidden;
    z-index: 12;
  }
  .char-hair::before {
    content: '';
    position: absolute;
    top: 6px; left: 38px;
    width: 52px; height: 28px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.06) 50%, transparent 100%);
    border-radius: 50%;
  }
  .char-hair::after {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 26px;
    background: #1e1b4b;
    border-radius: 50% 50% 0 0;
  }

  /* ── Eyebrows ────────────────────────────────────────── */
  .char-brow {
    width: 28px; height: 5px;
    background: #1e1b4b;
    border-radius: 3px;
    position: absolute;
    top: 30px;
    transition: transform .35s ease, top .35s ease;
  }
  .char-brow-l { left: 17px;  transform: rotate(-4deg); }
  .char-brow-r { right: 17px; transform: rotate(4deg); }

  /* ── Eyes ───────────────────────────────────────────── */
  .char-eye {
    width: 30px; height: 32px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 42px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.13);
    overflow: hidden;
    transition: opacity .3s ease, transform .3s ease;
    will-change: transform;
  }
  .char-eye-l { left: 18px; }
  .char-eye-r { right: 18px; }
  .char-eye-l { animation: eye-blink 4.2s ease-in-out infinite 1s; }
  .char-eye-r { animation: eye-blink 4.2s ease-in-out infinite 1.15s; }

  /* ── Pupils ─────────────────────────────────────────── */
  .char-pupil {
    width: 17px; height: 17px;
    background: #1e1b4b;
    border-radius: 50%;
    position: relative; flex-shrink: 0;
    transition: transform .25s ease;
  }
  .char-pupil::before {
    content: '';
    width: 6px; height: 6px;
    background: white; border-radius: 50%;
    position: absolute; top: 2px; right: 2px;
  }
  .char-pupil::after {
    content: '';
    width: 3px; height: 3px;
    background: rgba(255,255,255,.65); border-radius: 50%;
    position: absolute; bottom: 3px; left: 2px;
  }

  /* ── Nose ───────────────────────────────────────────── */
  .char-nose {
    width: 12px; height: 8px;
    background: #e5940a;
    border-radius: 50%;
    position: absolute;
    top: 76px; left: 55px;
    opacity: .6;
  }

  /* ── Mouth ──────────────────────────────────────────── */
  .char-mouth {
    width: 36px; height: 18px;
    border: 3px solid #1e1b4b;
    border-top: none;
    border-radius: 0 0 36px 36px;
    position: absolute;
    top: 86px; left: 43px;
    transition: all .35s cubic-bezier(.34,1.56,.64,1);
  }

  /* ── Cheek blush ─────────────────────────────────────── */
  .char-blush {
    width: 22px; height: 11px;
    background: #fb7185;
    border-radius: 50%;
    position: absolute;
    top: 68px;
    opacity: 0;
    transition: opacity .4s ease;
  }
  .char-blush-l { left: 4px; }
  .char-blush-r { right: 4px; }

  /* ── Neck ───────────────────────────────────────────── */
  .char-neck {
    width: 24px; height: 22px;
    background: #fbbf24;
    border-left: 2px solid #f0960a;
    border-right: 2px solid #f0960a;
    position: absolute;
    top: 118px; left: 93px;
    z-index: 9;
  }

  /* ── Body / shirt ────────────────────────────────────── */
  .char-body {
    width: 92px; height: 100px;
    background: linear-gradient(150deg, #6366f1 0%, #4f46e5 55%, #4338ca 100%);
    border-radius: 30px 30px 22px 22px;
    position: absolute;
    top: 138px; left: 59px;
    box-shadow: inset -6px -8px 18px rgba(0,0,0,.16), 0 5px 14px rgba(79,70,229,.28);
    z-index: 8;
    overflow: hidden;
  }
  /* V-neck collar */
  .char-body::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 26px solid rgba(255,255,255,.22);
  }
  /* Shirt button line */
  .char-body::after {
    content: '';
    position: absolute;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 42px;
    background: rgba(255,255,255,.14);
    border-radius: 2px;
  }

  /* ── Arms ───────────────────────────────────────────── */
  .char-arm {
    width: 22px; height: 80px;
    background: linear-gradient(160deg, #5b5ef4 0%, #4338ca 100%);
    border-radius: 11px;
    position: absolute;
    top: 142px;
    transform-origin: top center;
    transition: transform .55s cubic-bezier(.34,1.56,.64,1);
    will-change: transform;
    z-index: 7;
    box-shadow: inset -3px -3px 8px rgba(0,0,0,.15);
  }
  .char-arm-l { left: 26px;  transform: rotate(-10deg); }
  .char-arm-r { right: 26px; transform: rotate(10deg); }

  /* ── Hands ──────────────────────────────────────────── */
  .char-hand {
    width: 28px; height: 28px;
    background: linear-gradient(150deg, #fde68a 0%, #fbbf24 100%);
    border-radius: 50%;
    position: absolute;
    bottom: -15px; left: 50%;
    transform: translateX(-50%);
    border: 2px solid #f0960a;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }

  /* ── Speech bubble ───────────────────────────────────── */
  .speech-bubble {
    position: absolute;
    top: -56px; left: 50%;
    transform: translateX(-50%) scale(.8);
    background: white;
    padding: .55rem 1.1rem;
    border-radius: 22px;
    box-shadow: 0 4px 18px rgba(0,0,0,.14);
    opacity: 0;
    transition: opacity .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), top .25s ease;
    white-space: nowrap;
    font-weight: 600;
    font-size: .88rem;
    color: #1f2937;
    pointer-events: none;
    z-index: 30;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid white;
  }
  .speech-bubble.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    top: -64px;
  }

  /* ════════════════════════════════════════════════
     STATE MODIFIERS  (applied to .char)
     ════════════════════════════════════════════════ */

  /* Smile */
  .char-smile .char-mouth {
    width: 46px; height: 26px;
    border-radius: 0 0 46px 46px;
    top: 84px; left: 38px;
    border-width: 3.5px;
  }
  .char-smile .char-blush-l,
  .char-smile .char-blush-r { opacity: .6; }
  .char-smile .char-brow-l  { transform: rotate(-8deg); top: 26px; }
  .char-smile .char-brow-r  { transform: rotate(8deg);  top: 26px; }

  /* Wave — right arm only */
  .char-wave .char-arm-r {
    animation: wave-arm .72s ease-in-out 3 forwards;
  }

  /* Cover eyes — both arms swing up in front of face */
  .char-cover .char-arm-l { transform: rotate(148deg); z-index: 20; }
  .char-cover .char-arm-r { transform: rotate(-148deg); z-index: 20; }
  .char-cover .char-eye-l,
  .char-cover .char-eye-r  { opacity: 0; animation: none; }
  .char-cover .char-brow-l { transform: rotate(12deg); top: 34px; }
  .char-cover .char-brow-r { transform: rotate(-12deg); top: 34px; }

  /* Peek — arms up but eyes half-open */
  .char-peek .char-arm-l { transform: rotate(148deg); z-index: 20; }
  .char-peek .char-arm-r { transform: rotate(-148deg); z-index: 20; }
  .char-peek .char-eye-l,
  .char-peek .char-eye-r  { transform: scaleY(.35); opacity: .7; animation: none; }
  .char-peek .char-brow-l { transform: rotate(-12deg); top: 20px; }
  .char-peek .char-brow-r { transform: rotate(12deg);  top: 20px; }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.5rem;
  }

  .auth-header p {
    color: #6b7280;
    font-size: 0.95rem;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-weight: 600;
    color: #374151;
    font-size: 0.875rem;
  }

  .form-group input {
    padding: 0.75rem 1rem;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .form-group input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }

  .auth-button {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    padding: 0.875rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .auth-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
  }

  .auth-button:active {
    transform: translateY(0);
  }

  .auth-divider {
    text-align: center;
    margin: 1.5rem 0;
    position: relative;
  }

  .auth-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #e5e7eb;
  }

  .auth-divider span {
    background: white;
    padding: 0 1rem;
    position: relative;
    color: #6b7280;
    font-size: 0.875rem;
  }

  .auth-links {
    text-align: center;
    margin-top: 1.5rem;
  }

  .auth-links a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .auth-links a:hover {
    color: #2563eb;
    text-decoration: underline;
  }

  .auth-links p {
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }

  .error-message {
    background: #fee;
    border: 1px solid #fcc;
    color: #c33;
    padding: 0.875rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .error-message::before {
    content: "⚠";
    font-size: 1.2rem;
  }

  .secondary-link {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid #e5e7eb;
  }

  .app-download-link {
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e5e7eb;
    text-align: center;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    background: linear-gradient(135deg, #1f2937, #374151);
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    transition: all 0.2s ease;
    width: auto;
  }

  .download-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(31, 41, 55, 0.3);
  }

  /* Tablet and below */
  @media (max-width: 1024px) {
    .auth-container {
      gap: 2rem;
    }
  }

  /* Mobile devices */
  @media (max-width: 768px) {
    .auth-container {
      flex-direction: column;
      gap: 0;
      padding: 1rem;
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for mobile browsers */
      justify-content: flex-start;
      padding-top: 1rem;
    }

    .character-container {
      order: -1;
      transform: scale(0.6);
      transform-origin: center center;
      margin: -2.5rem 0 -3rem 0;
      flex-shrink: 0;
    }

    .character {
      width: 200px;
      height: 250px;
    }

    .auth-card {
      padding: 1.5rem;
      max-width: 100%;
      width: 100%;
      box-sizing: border-box;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -5px 40px rgba(0, 0, 0, 0.15);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .auth-header {
      margin-bottom: 1.5rem;
    }

    .auth-header h1 {
      font-size: 1.6rem;
    }

    .auth-header p {
      font-size: 0.9rem;
    }

    .auth-form {
      gap: 1.25rem;
    }

    .form-group {
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.85rem;
    }

    .form-group input {
      padding: 0.875rem 1rem;
      font-size: 16px; /* Prevents iOS zoom on focus */
      border-radius: 10px;
    }

    .auth-button {
      padding: 0.9rem 1.25rem;
      font-size: 1rem;
      border-radius: 10px;
      margin-top: 0.25rem;
    }

    .auth-divider {
      margin: 1.25rem 0;
    }

    .auth-links {
      margin-top: 1rem;
    }

    .auth-links p {
      font-size: 0.9rem;
    }

    .speech-bubble {
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
    }

    .app-download-link {
      margin-top: 1.25rem;
      padding-top: 1rem;
    }

    .download-btn {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      border-radius: 10px;
    }

    .error-message {
      padding: 0.75rem;
      font-size: 0.85rem;
      border-radius: 10px;
    }

    .secondary-link {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
    }
  }

  /* Small phones */
  @media (max-width: 480px) {
    .auth-container {
      padding: 0.5rem;
      padding-top: 0.5rem;
    }

    .character-container {
      transform: scale(0.5);
      margin: -3rem 0 -3.5rem 0;
    }

    .auth-card {
      padding: 1.25rem;
      border-radius: 16px 16px 0 0;
    }

    .auth-header {
      margin-bottom: 1.25rem;
    }

    .auth-header h1 {
      font-size: 1.4rem;
    }

    .auth-header p {
      font-size: 0.85rem;
    }

    .auth-form {
      gap: 1rem;
    }

    .form-group {
      gap: 0.35rem;
    }

    .form-group input {
      padding: 0.8rem 0.9rem;
    }

    .auth-button {
      padding: 0.85rem 1rem;
    }

    .auth-divider {
      margin: 1rem 0;
    }

    .auth-links p {
      font-size: 0.85rem;
    }
  }

  /* Very small screens */
  @media (max-width: 360px) {
    .character-container {
      transform: scale(0.45);
      margin: -3.5rem 0 -4rem 0;
    }

    .auth-container {
      padding: 0.25rem;
    }

    .auth-card {
      padding: 1rem;
    }

    .auth-header h1 {
      font-size: 1.3rem;
    }

    .auth-header p {
      font-size: 0.8rem;
    }

    .form-group input {
      padding: 0.75rem 0.85rem;
    }

    .auth-button {
      padding: 0.8rem;
      font-size: 0.95rem;
    }
  }

  /* Landscape mode on mobile */
  @media (max-height: 600px) and (orientation: landscape) {
    .auth-container {
      flex-direction: row;
      padding: 0.5rem 1rem;
      gap: 1rem;
      min-height: 100vh;
      align-items: center;
    }

    .character-container {
      transform: scale(0.5);
      margin: 0;
      order: 0;
    }

    .auth-card {
      border-radius: 16px;
      flex: 1;
      max-width: 400px;
      padding: 1rem;
    }

    .auth-header {
      margin-bottom: 0.75rem;
    }

    .auth-header h1 {
      font-size: 1.25rem;
    }

    .auth-form {
      gap: 0.75rem;
    }

    .form-group input {
      padding: 0.6rem 0.75rem;
    }

    .auth-button {
      padding: 0.6rem;
    }

    .auth-divider {
      margin: 0.5rem 0;
    }

    .auth-links {
      margin-top: 0.5rem;
    }
  }
</style>

<div class="auth-container">
  <!-- Animated Character -->
  <div class="character-container">
    <div class="char" id="char">
      <div class="speech-bubble" id="speechBubble"></div>
      <div class="char-head">
        <div class="char-hair"></div>
        <div class="char-brow char-brow-l"></div>
        <div class="char-brow char-brow-r"></div>
        <div class="char-eye char-eye-l"><div class="char-pupil"></div></div>
        <div class="char-eye char-eye-r"><div class="char-pupil"></div></div>
        <div class="char-nose"></div>
        <div class="char-mouth"></div>
        <div class="char-blush char-blush-l"></div>
        <div class="char-blush char-blush-r"></div>
      </div>
      <div class="char-neck"></div>
      <div class="char-body"></div>
      <div class="char-arm char-arm-l" id="armL"><div class="char-hand"></div></div>
      <div class="char-arm char-arm-r" id="armR"><div class="char-hand"></div></div>
      <div class="char-shadow"></div>
    </div>
  </div>

  <!-- Login Form -->
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    {% if error %}
    <div class="error-message">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/web/login" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="auth-button">Sign In</button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <div class="auth-links">
      <p>Don't have an account? <a href="/web/signup">Create one now</a></p>
      <div class="secondary-link">
        <p>Invited by admin? <a href="/web/set-password">Set your password</a></p>
      </div>
    </div>
    
    <!-- Mobile App Download Link -->
    <div class="app-download-link">
      <a href="/web/download" class="download-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
        </svg>

</div>

<script>
  const char = document.getElementById('char');
  const bubble = document.getElementById('speechBubble');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  let bubbleTimer, peekTimer, greetedName = '';

  function showBubble(msg, duration) {
    clearTimeout(bubbleTimer);
    bubble.textContent = msg;
    bubble.classList.add('show');
    if (duration) {
      bubbleTimer = setTimeout(() => bubble.classList.remove('show'), duration);
    }
  }

  function hideBubble() {
    clearTimeout(bubbleTimer);
    bubble.classList.remove('show');
  }

  function setState(states) {
    char.classList.remove('char-smile', 'char-wave', 'char-cover', 'char-peek');
    states.forEach(s => char.classList.add(s));
  }

  // Entry animation
  setTimeout(() => {
    setState(['char-smile', 'char-wave']);
    showBubble('👋 Welcome back!', 2600);
    setTimeout(() => char.classList.remove('char-wave'), 2200);
  }, 700);

  username.addEventListener('focus', () => {
    if (password.value.length === 0) {
      setState(username.value.trim() ? ['char-smile'] : []);
    }
  });

  username.addEventListener('input', () => {
    const val = username.value.trim();
    if (val) {
      if (val !== greetedName) {
        greetedName = val;
        setState(['char-smile', 'char-wave']);
        showBubble(`Hi, ${val}! 😊`, 2200);
        setTimeout(() => char.classList.remove('char-wave'), 1800);
      } else {
        setState(['char-smile']);
      }
    } else {
      greetedName = '';
      setState([]);
      hideBubble();
    }
  });

  password.addEventListener('focus', () => {
    setState(['char-cover']);
    showBubble("🙈 I won't look!");
  });

  password.addEventListener('input', () => {
    clearTimeout(peekTimer);
    setState(['char-peek']);
    showBubble('👀 Almost there...', 99999);
    peekTimer = setTimeout(() => {
      setState(['char-cover']);
      showBubble("🙈 I won't look!");
    }, 1200);
  });

  password.addEventListener('blur', () => {
    clearTimeout(peekTimer);
    setState(username.value.trim() ? ['char-smile'] : []);
    hideBubble();
  });
</script>
{% endblock %}
