<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Bubbles — {{ workspace.site_title if workspace and workspace.site_title else 'Support' }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    {% if workspace and workspace.gui_theme == 'ocean' %}
    :root { --brand: #0284c7; --brand-dark: #0369a1; --brand-xdark: #075985; --brand-light: #e0f2fe; --brand-ring: #7dd3fc; --brand-mid: #bae6fd; }
    {% elif workspace and workspace.gui_theme == 'forest' %}
    :root { --brand: #16a34a; --brand-dark: #15803d; --brand-xdark: #166534; --brand-light: #dcfce7; --brand-ring: #86efac; --brand-mid: #bbf7d0; }
    {% elif workspace and workspace.gui_theme == 'midnight' %}
    :root { --brand: #4f46e5; --brand-dark: #4338ca; --brand-xdark: #3730a3; --brand-light: #e0e7ff; --brand-ring: #a5b4fc; --brand-mid: #c7d2fe; }
    {% elif workspace and workspace.gui_theme == 'ember' %}
    :root { --brand: #ea580c; --brand-dark: #c2410c; --brand-xdark: #9a3412; --brand-light: #ffedd5; --brand-ring: #fdba74; --brand-mid: #fed7aa; }
    {% else %}
    :root { --brand: #b91c1c; --brand-dark: #991b1b; --brand-xdark: #7f1d1d; --brand-light: #fee2e2; --brand-ring: #fca5a5; --brand-mid: #fecaca; }
    {% endif %}
    body { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 60%, var(--brand-light) 100%); }
    .brand-btn { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; transition: all .2s; }
    .brand-btn:hover { background: linear-gradient(135deg, var(--brand-dark), var(--brand-xdark)); box-shadow: 0 6px 20px rgba(0,0,0,.18); }
    .brand-avatar { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); }
    .brand-text { color: var(--brand); }
    .brand-bg-light { background-color: var(--brand-light); }
    .brand-bg-mid { background-color: var(--brand-mid); }
    .brand-focus:focus { outline: none; box-shadow: 0 0 0 3px var(--brand-ring); border-color: var(--brand); }
    .brand-chip { background: var(--brand-mid); color: var(--brand-dark); }
    .brand-chip:hover { background: var(--brand-ring); }
    .solution-card { border: 1px solid var(--brand-ring); background: linear-gradient(135deg, var(--brand-light) 0%, #fff 100%); }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .dot-bounce { animation: bounce 1.2s infinite; }
  </style>
</head>
<body class="min-h-screen py-6 px-4">

  <!-- Top nav -->
  <div class="max-w-2xl mx-auto mb-5 flex items-center justify-between">
    <a href="/" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1.5 transition-colors">
      <i class="fas fa-arrow-left text-xs"></i> Back to Portal
    </a>
    <a href="/web/tickets/guest"
       class="text-sm font-medium brand-text hover:opacity-80 flex items-center gap-1.5 transition-opacity">
      <i class="fas fa-ticket-alt text-xs"></i> Submit a Ticket
    </a>
  </div>

  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-5">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl brand-avatar shadow-lg mb-3">
        <span class="text-3xl">🫧</span>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">Chat with Bubbles</h1>
      <p class="text-gray-500 mt-1 text-sm">Your AI support assistant — here to help!</p>
    </div>

    <!-- Chat window -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">

      <!-- Messages area -->
      <div id="chat-box" class="h-[420px] overflow-y-auto p-4 space-y-4 bg-gray-50/60">

        <!-- Welcome message injected by JS -->

      </div>

      <!-- Input bar -->
      <div class="p-4 border-t border-gray-100 bg-white">
        <div class="flex gap-2">
          <input type="text" id="chat-input"
                 class="brand-focus flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm bg-gray-50"
                 placeholder="Describe your issue..."
                 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
          <button onclick="document.getElementById('img-upload').click()"
                  class="px-3 py-3 bg-gray-100 text-gray-500 rounded-xl hover:bg-gray-200 transition" title="Upload screenshot">
            <i class="fas fa-image"></i>
          </button>
          <button id="cam-btn" onclick="document.getElementById('cam-upload').click()"
                  class="hidden px-3 py-3 bg-green-50 text-green-600 rounded-xl hover:bg-green-100 transition" title="Take photo">
            <i class="fas fa-camera"></i>
          </button>
          <button onclick="sendMessage()" id="send-btn"
                  class="brand-btn px-5 py-3 rounded-xl font-semibold text-sm flex items-center gap-2">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <input type="file" id="img-upload" accept="image/*" class="hidden" onchange="handleImage(this)">
        <input type="file" id="cam-upload" accept="image/*" capture="environment" class="hidden" onchange="handleImage(this)">
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">
      <i class="fas fa-lock mr-1"></i>Your conversation is private and not linked to any previous chats.
    </p>
  </div>

  <script>
    // ── State ────────────────────────────────────────
    // Each page load = fresh session. No email persistence, no history recall.
    const SESSION_ID = (() => {
      try { return crypto.randomUUID(); } catch(e) {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : r & 3 | 8).toString(16);
        });
      }
    })();
    let conversationHistory = [];
    let currentProblem = '';
    let currentSolution = '';
    let currentArticleId = null;
    let failedAttempts = 0;
    let flowName = null;
    let flowStep = null;
    let stepsTried = [];
    let ticketPrefill = null;

    // ── DOM helpers ──────────────────────────────────
    const box = () => document.getElementById('chat-box');

    function scrollBottom() { const b = box(); b.scrollTop = b.scrollHeight; }

    function appendEl(el) { box().appendChild(el); scrollBottom(); }

    function bubbleDiv(inner, isUser = false) {
      const wrap = document.createElement('div');
      wrap.className = 'flex items-start gap-3 ' + (isUser ? 'flex-row-reverse' : '');

      const avatar = isUser
        ? '<div class="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center flex-shrink-0 shadow-sm"><i class="fas fa-user text-white text-sm"></i></div>'
        : '<div class="w-9 h-9 rounded-full brand-avatar flex items-center justify-center flex-shrink-0 shadow-sm"><span class="text-base">🫧</span></div>';

      const bubbleCls = isUser
        ? 'rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm max-w-xs sm:max-w-sm brand-btn text-sm'
        : 'rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm max-w-xs sm:max-w-sm bg-white border border-gray-100 text-sm text-gray-700';

      wrap.innerHTML = `${avatar}<div class="${bubbleCls}">${inner}</div>`;
      return wrap;
    }

    function addMsg(inner, isUser = false) { appendEl(bubbleDiv(inner, isUser)); }

    function addTyping() {
      const d = document.createElement('div');
      d.id = 'typing';
      d.className = 'flex items-start gap-3';
      d.innerHTML = `
        <div class="w-9 h-9 rounded-full brand-avatar flex items-center justify-center flex-shrink-0 shadow-sm"><span class="text-base">🫧</span></div>
        <div class="bg-white border border-gray-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center gap-1">
          <span class="text-xs text-gray-400 mr-1">Thinking</span>
          <span class="w-1.5 h-1.5 rounded-full brand-avatar dot-bounce" style="animation-delay:0ms"></span>
          <span class="w-1.5 h-1.5 rounded-full brand-avatar dot-bounce" style="animation-delay:150ms"></span>
          <span class="w-1.5 h-1.5 rounded-full brand-avatar dot-bounce" style="animation-delay:300ms"></span>
        </div>`;
      appendEl(d);
    }

    function removeTyping() { document.getElementById('typing')?.remove(); }

    function addChips(replies) {
      const d = document.createElement('div');
      d.className = 'flex flex-wrap gap-2 pl-12';
      replies.forEach(r => {
        const btn = document.createElement('button');
        btn.className = 'brand-chip px-3 py-1.5 rounded-full text-xs font-medium transition-colors';
        btn.textContent = r.text;
        btn.onclick = () => handleChip(r.text, r.next || '', r.action || null);
        d.appendChild(btn);
      });
      appendEl(d);
    }

    function addSolutionCard(sol, isKB = false) {
      const d = document.createElement('div');
      d.className = 'flex items-start gap-3';
      const source = isKB ? '📚 Knowledge Base' : '🌐 Web Search';
      const content = isKB ? sol.solution : sol.suggestion;
      const title = sol.title || 'Suggestion';
      d.innerHTML = `
        <div class="w-9 h-9 rounded-full brand-avatar flex items-center justify-center flex-shrink-0 shadow-sm"><span class="text-base">🫧</span></div>
        <div class="solution-card rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm max-w-xs sm:max-w-sm text-sm">
          <p class="text-[10px] font-semibold brand-text mb-1">${source}</p>
          <p class="font-semibold text-gray-800 mb-1">${title}</p>
          <p class="text-gray-600 text-xs leading-relaxed mb-3">${content}</p>
          <div class="flex gap-2">
            <button onclick="feedback(true,${sol.id||'null'},'${isKB}')"
                    class="flex-1 px-3 py-1.5 bg-green-50 text-green-700 border border-green-200 rounded-lg text-xs hover:bg-green-100 transition">
              <i class="fas fa-thumbs-up mr-1"></i>Helped!
            </button>
            <button onclick="feedback(false,${sol.id||'null'},'${isKB}')"
                    class="flex-1 px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-lg text-xs hover:bg-red-100 transition">
              <i class="fas fa-thumbs-down mr-1"></i>Not helpful
            </button>
          </div>
        </div>`;
      appendEl(d);
      currentSolution = content;
      currentArticleId = sol.id || null;
    }

    // ── Welcome message ──────────────────────────────
    function showWelcome() {
      const d = document.createElement('div');
      d.className = 'flex items-start gap-3';
      d.innerHTML = `
        <div class="w-9 h-9 rounded-full brand-avatar flex items-center justify-center flex-shrink-0 shadow-sm"><span class="text-base">🫧</span></div>
        <div class="bg-white border border-gray-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm max-w-xs sm:max-w-sm">
          <p class="text-sm text-gray-800 mb-1">👋 Hi! I'm <strong>Bubbles</strong>, your support assistant.</p>
          <p class="text-xs text-gray-500 mb-3">Describe your problem and I'll try to help. If I can't solve it, I'll help you create a ticket!</p>
          <p class="text-[10px] text-gray-400 mb-2">Quick start — tap an issue below:</p>
          <div class="flex flex-wrap gap-1.5" id="initial-chips">
            ${[
              ['🖨️ Printer problem','My printer is not working'],
              ['📶 WiFi issues','I cannot connect to WiFi'],
              ['📧 Email not working','My email is not working'],
              ['🐢 Slow computer','My computer is running slow'],
              ['🔑 Password reset','I need to reset my password'],
              ['❓ Other issue','Something else']
            ].map(([label, msg]) =>
              `<button onclick="quickReply('${msg}')" class="brand-chip px-2.5 py-1 rounded-full text-xs font-medium transition-colors">${label}</button>`
            ).join('')}
          </div>
        </div>`;
      box().appendChild(d);
    }

    // ── Send / receive ───────────────────────────────
    async function post(payload) {
      const r = await fetch('/web/tickets/support/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const ct = r.headers.get('content-type') || '';
      if (!ct.includes('application/json')) {
        throw new Error(`Server returned ${r.status} (${r.statusText})`);
      }
      return r.json();
    }

    async function sendMessage() {
      const inp = document.getElementById('chat-input');
      const msg = inp.value.trim();
      if (!msg) return;

      currentProblem = msg;
      conversationHistory.push({ role: 'user', content: msg });
      addMsg(`<span>${msg}</span>`, true);
      inp.value = '';
      addTyping();
      inp.disabled = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const data = await post({
          message: msg,
          session_id: SESSION_ID,
          guest_email: '',   // never send email — each visit is a fresh person
          flow_name: flowName,
          flow_step: flowStep,
          conversation_history: conversationHistory.slice(-10)
        });
        removeTyping();
        if (data.error) {
          addMsg(`<span class="text-red-500">Sorry, something went wrong on my end. Please try again in a moment.</span>`);
        } else {
          handleResp(data);
        }
      } catch(e) {
        removeTyping();
        addMsg('<span class="text-red-500">Could not reach support assistant — please check your connection and try again.</span>');
      } finally {
        inp.disabled = false;
        document.getElementById('send-btn').disabled = false;
        inp.focus();
      }
    }

    function quickReply(msg) {
      document.getElementById('initial-chips')?.closest('.flex.items-start')?.remove();
      document.getElementById('chat-input').value = msg;
      sendMessage();
    }

    function handleChip(val, next, action) {
      stepsTried.push(val);
      if (action === 'create_ticket') { goToTicket(); return; }
      if (next === 'restart') { flowStep = null; quickReply('Let me try again'); return; }
      if (next === 'new_issue') { flowName = null; flowStep = null; addMsg('<span>No problem! What else can I help you with?</span>'); return; }
      if (next === 'goodbye') { flowName = null; flowStep = null; addMsg('<span>Have a great day! 👋</span>'); return; }
      flowStep = next;
      addMsg(`<span>${val}</span>`, true);
      conversationHistory.push({ role: 'user', content: val });
      addTyping();
      post({ message: val, session_id: SESSION_ID, guest_email: '', flow_name: flowName, flow_step: flowStep, conversation_history: conversationHistory.slice(-10) })
        .then(data => { removeTyping(); handleResp(data); })
        .catch(() => { removeTyping(); addMsg('<span class="text-red-500">Something went wrong.</span>'); });
    }

    function handleResp(data) {
      if (data.is_conversational && data.bubbles_response) {
        const html = data.bubbles_response
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n\n/g, '</p><p class="mt-2">')
          .replace(/\n/g, '<br>');
        addMsg(`<p>${html}</p>`);
        conversationHistory.push({ role: 'assistant', content: data.bubbles_response });
        if (data.flow_name) flowName = data.flow_name;
        if (data.flow_step !== undefined) flowStep = data.flow_step;
        if (data.quick_replies?.length) addChips(data.quick_replies);
        if (data.ticket_prefill) ticketPrefill = data.ticket_prefill;
        return;
      }

      if (data.found_in_kb && data.kb_articles?.length) {
        addMsg(`<span>I found <strong>${data.kb_articles.length}</strong> solution(s) that might help:</span>`);
        data.kb_articles.forEach(a => addSolutionCard(a, true));
        return;
      }

      if (data.web_results?.length) {
        addMsg('<span>I searched the web and found some suggestions:</span>');
        data.web_results.forEach(r => addSolutionCard(r, false));
        return;
      }

      // No solution found
      failedAttempts++;
      if (failedAttempts >= 3) {
        addMsg(`
          <p class="mb-2"><i class="fas fa-user-tie brand-text mr-1"></i>I wasn't able to solve this — let me connect you with our support team!</p>
          <button onclick="goToTicket()" class="brand-btn mt-1 px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-2">
            <i class="fas fa-ticket-alt"></i>Create Support Ticket
          </button>`);
      } else {
        addMsg(`
          <p class="mb-2">Hmm, I couldn't find the right answer. Try describing it differently?</p>
          <div class="flex gap-2">
            <button onclick="document.getElementById('chat-input').focus()" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs hover:bg-gray-200 transition">
              <i class="fas fa-redo mr-1"></i>Try again
            </button>
            <button onclick="goToTicket()" class="brand-btn px-3 py-1.5 rounded-lg text-xs font-semibold">
              <i class="fas fa-ticket-alt mr-1"></i>Create Ticket
            </button>
          </div>`);
      }
    }

    // ── Feedback ─────────────────────────────────────
    async function feedback(helpful, articleId, isKB) {
      try {
        await fetch('/web/tickets/support/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID, helpful, article_id: articleId !== 'null' ? articleId : null, problem: currentProblem, solution: currentSolution })
        });
      } catch(e) {}
      if (helpful) {
        failedAttempts = 0; flowName = null; flowStep = null;
        addMsg('<p><i class="fas fa-check-circle text-green-500 mr-1"></i>Great, glad that helped! 🎉 Anything else I can do?</p>');
      } else {
        failedAttempts++;
        if (failedAttempts >= 3) {
          addMsg(`<p class="mb-2">I'm sorry I couldn't help. Our support team can sort this out!</p>
            <button onclick="goToTicket()" class="brand-btn mt-1 px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-2"><i class="fas fa-ticket-alt"></i>Create Support Ticket</button>`);
        } else {
          addMsg('<p>Sorry about that! Try describing it a different way or create a ticket and a human will help you.</p>');
        }
      }
    }

    // ── Ticket redirect ───────────────────────────────
    function goToTicket() {
      if (ticketPrefill) {
        sessionStorage.setItem('bubbles_prefill', JSON.stringify(ticketPrefill));
      } else {
        sessionStorage.setItem('bubbles_prefill', JSON.stringify({
          subject: currentProblem.substring(0, 100),
          description: 'Conversation with Bubbles:\n' + conversationHistory.map(m => m.role + ': ' + m.content).join('\n')
        }));
      }
      window.location.href = '/web/tickets/guest';
    }

    // ── Image upload ──────────────────────────────────
    async function handleImage(input) {
      if (!input.files?.[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) { addMsg('<span class="text-red-500">Image too large (max 5 MB).</span>'); return; }
      const reader = new FileReader();
      reader.onload = async e => {
        addMsg(`<div><p class="mb-1 text-xs"><i class="fas fa-image mr-1"></i>Analyzing screenshot...</p><img src="${e.target.result}" class="max-w-[180px] rounded-lg" alt="screenshot"></div>`, true);
        addTyping();
        try {
          const fd = new FormData();
          fd.append('image', file);
          fd.append('session_id', SESSION_ID);
          const r = await fetch('/web/tickets/support/analyze-image', { method: 'POST', body: fd });
          const data = await r.json();
          removeTyping();
          if (data.bubbles_response) {
            const html = data.bubbles_response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            addMsg(`<p>${html}</p>`);
          } else if (data.error) {
            addMsg(`<span>${data.error}</span>`);
          }
        } catch(e) { removeTyping(); addMsg('<span>Could not analyze the image — please describe the issue in text.</span>'); }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // ── Camera detection ──────────────────────────────
    async function detectCamera() {
      if (/Android|iPhone|iPad/i.test(navigator.userAgent)) { document.getElementById('cam-btn').classList.remove('hidden'); return; }
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        if (devices.some(d => d.kind === 'videoinput')) document.getElementById('cam-btn').classList.remove('hidden');
      } catch(e) {}
    }

    // ── Init ──────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      showWelcome();
      detectCamera();
      document.getElementById('chat-input').focus();
    });
  </script>
</body>
</html>
